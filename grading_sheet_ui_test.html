<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson Plan Academic Grading Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 40%, #7dd3fc 100%);
            --font-family: 'Plus Jakarta Sans', sans-serif;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.5);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.08);
            --glass-shadow-hover: 0 16px 45px 0 rgba(31, 38, 135, 0.15);
            --color-text-main: #0f172a;
            --color-text-sub: #334155;
            
            /* Criteria colors */
            --color-high-start: #10b981;
            --color-high-end: #059669;
            --color-medium-start: #fbbf24;
            --color-medium-end: #d97706;
            --color-low-start: #f87171;
            --color-low-end: #dc2626;
        }

        * {
            box-sizing: border-box;
            transition: all 0.2s ease-in-out;
        }

        body {
            font-family: var(--font-family);
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--color-text-main);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Ambient Glowing Background Elements */
        body::before {
            content: "";
            position: fixed;
            top: 10%;
            left: 5%;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.45) 0%, rgba(56, 189, 248, 0) 70%);
            border-radius: 50%;
            z-index: -1;
            pointer-events: none;
        }
        body::after {
            content: "";
            position: fixed;
            bottom: 10%;
            right: 5%;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.35) 0%, rgba(14, 165, 233, 0) 70%);
            border-radius: 50%;
            z-index: -1;
            pointer-events: none;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            color: #0c4a6e;
            margin: 0 0 10px 0;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 1.15rem;
            font-weight: 600;
            color: #0369a1;
            margin: 0;
        }

        /* Overview Stat Grid */
        .overview-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            box-shadow: var(--glass-shadow);
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--glass-shadow-hover);
            background: rgba(255, 255, 255, 0.45);
        }

        .stat-val {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0;
        }
        
        .stat-val.total { color: #0f172a; }
        .stat-val.passed { color: #047857; }
        .stat-val.failed { color: #b91c1c; }

        .stat-lbl {
            font-size: 0.95rem;
            font-weight: 700;
            color: #334155;
            margin: 8px 0 0 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Board grid & layout */
        .boards-list {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .glass-board {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.45);
            border-radius: 24px;
            padding: 30px;
            box-shadow: var(--glass-shadow);
        }

        .glass-board:hover {
            transform: translateY(-4px);
            box-shadow: var(--glass-shadow-hover);
            background: rgba(255, 255, 255, 0.4);
        }

        /* Board Header */
        .board-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1.5px solid rgba(255, 255, 255, 0.3);
            padding-bottom: 18px;
            margin-bottom: 24px;
        }

        .board-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: #0f172a;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Badges */
        .badge {
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .badge-pass {
            background: rgba(16, 185, 129, 0.18);
            color: #065f46;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .badge-fail {
            background: rgba(239, 68, 68, 0.18);
            color: #991b1b;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        /* Board Grid Layout */
        .board-content {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 32px;
        }

        /* Progress Bars */
        .progress-item {
            margin-bottom: 18px;
        }

        .progress-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .progress-name {
            font-size: 0.95rem;
            font-weight: 700;
            color: #1e293b;
        }

        .progress-pct {
            font-size: 0.95rem;
            font-weight: 800;
        }

        .pct-high { color: #047857; }
        .pct-medium { color: #b45309; }
        .pct-low { color: #b91c1c; }

        .progress-track {
            background: rgba(255, 255, 255, 0.4);
            border-radius: 10px;
            height: 12px;
            width: 100%;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .progress-fill {
            height: 100%;
            border-radius: 10px;
            width: 0;
            transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .fill-high {
            background: linear-gradient(90deg, var(--color-high-start) 0%, var(--color-high-end) 100%);
        }

        .fill-medium {
            background: linear-gradient(90deg, var(--color-medium-start) 0%, var(--color-medium-end) 100%);
        }

        .fill-low {
            background: linear-gradient(90deg, var(--color-low-start) 0%, var(--color-low-end) 100%);
        }

        /* Status Panels */
        .status-panel {
            background: rgba(255, 255, 255, 0.25);
            border-radius: 18px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .panel-title {
            font-size: 1.05rem;
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .title-fail { color: #991b1b; }
        .title-pass { color: #065f46; }
        .title-warning { color: #b45309; }

        .notes-list {
            margin: 0;
            padding-left: 20px;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .notes-list.fail-list li {
            color: #991b1b;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .notes-list.suggestion-list li {
            color: #334155;
            margin-bottom: 8px;
        }

        .success-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            height: 100%;
            padding: 20px 0;
        }

        .success-icon {
            font-size: 3.5rem;
            margin-bottom: 12px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .success-text {
            color: #047857;
            font-weight: 700;
            font-size: 1rem;
            margin: 0;
        }

        /* Responsive Layout adjustment */
        @media (max-width: 900px) {
            .overview-grid {
                grid-template-columns: 1fr;
            }
            .board-content {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎓 Academic Manager</h1>
            <div class="subtitle">Bảng tổng hợp điểm số và phân tích chất lượng giáo án học thuật</div>
        </header>

        <!-- Overview stats -->
        <div class="overview-grid">
            <div class="stat-card">
                <p class="stat-val total" id="stat-total">0</p>
                <p class="stat-lbl">Tổng số Lesson Plans</p>
            </div>
            <div class="stat-card">
                <p class="stat-val passed" id="stat-passed">0</p>
                <p class="stat-lbl">Đạt chuẩn (≥ 50 đ)</p>
            </div>
            <div class="stat-card">
                <p class="stat-val failed" id="stat-failed">0</p>
                <p class="stat-lbl">Không đạt chuẩn (< 50 đ)</p>
            </div>
        </div>

        <!-- Boards list container -->
        <div class="boards-list" id="boards-container">
            <div style="text-align: center; padding: 40px; font-weight: 600;">Đang tải dữ liệu và kết quả đánh giá...</div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            fetch('/api/results')
                .then(response => response.json())
                .then(data => {
                    // Update stats
                    const total = data.length;
                    const passed = data.filter(d => d.status === 'PASS').length;
                    const failed = total - passed;

                    document.getElementById('stat-total').textContent = total;
                    document.getElementById('stat-passed').textContent = passed;
                    document.getElementById('stat-failed').textContent = failed;

                    const container = document.getElementById('boards-container');
                    container.innerHTML = ''; // Clear loading indicator

                    if (total === 0) {
                        container.innerHTML = `<div style="text-align: center; padding: 40px; font-weight: 600; background: var(--glass-bg); border-radius: 20px; border: 1px solid var(--glass-border);">Chưa có dữ liệu giáo án nào được chấm điểm.</div>`;
                        return;
                    }

                    data.forEach((plan, index) => {
                        const board = document.createElement('div');
                        board.className = 'glass-board';

                        const isPass = plan.status === 'PASS';
                        const statusClass = isPass ? 'badge-pass' : 'badge-fail';
                        const statusText = isPass ? 'PASS' : 'FAIL';
                        const icon = isPass ? '🟢' : '🔴';

                        // Build progress bars
                        let progressHTML = '';
                        let lowGradeWarnings = [];

                        Object.entries(plan.scores).forEach(([key, score]) => {
                            // Extract max score from parentheses, e.g. "Data Extraction (15)"
                            const match = key.match(/\((\d+)\)/);
                            const maxScore = match ? parseInt(match[1], 10) : 100;
                            const cleanName = key.replace(/\s*\(\d+\)/, '');
                            const pct = maxScore > 0 ? (score / maxScore) * 100 : 0;

                            let colorClass = 'fill-high';
                            let pctClass = 'pct-high';
                            
                            if (pct < 50) {
                                colorClass = 'fill-low';
                                pctClass = 'pct-low';
                            } else if (pct < 80) {
                                colorClass = 'fill-medium';
                                pctClass = 'pct-medium';
                            }

                            if (pct < 70) {
                                lowGradeWarnings.push(`Tiêu chí <strong>${cleanName}</strong> đạt ${pct.toFixed(0)}% (${score}/${maxScore})`);
                            }

                            progressHTML += `
                                <div class="progress-item">
                                    <div class="progress-meta">
                                        <span class="progress-name">${cleanName}</span>
                                        <span class="progress-pct ${pctClass}">${score}/${maxScore} (${pct.toFixed(0)}%)</span>
                                    </div>
                                    <div class="progress-track">
                                        <div class="progress-fill ${colorClass}" style="width: ${pct}%"></div>
                                    </div>
                                </div>
                            `;
                        });

                        // Build status / details panel
                        let detailsHTML = '';
                        if (!isPass) {
                            const failedItemsList = plan.failed_items.map(item => `<li>${item}</li>`).join('');
                            const suggestionsList = plan.suggestions.map(s => `<li>${s}</li>`).join('');

                            detailsHTML = `
                                <div class="status-panel">
                                    <h4 class="panel-title title-fail">⚠️ LÝ DO CHƯA ĐẠT CHUẨN</h4>
                                    <ul class="notes-list fail-list">
                                        ${failedItemsList}
                                    </ul>
                                    <h4 class="panel-title title-fail" style="margin-top: 18px;">💡 ĐỀ XUẤT HƯỚNG GIẢI QUYẾT</h4>
                                    <ul class="notes-list suggestion-list">
                                        ${suggestionsList}
                                    </ul>
                                </div>
                            `;
                        } else if (lowGradeWarnings.length > 0) {
                            const warningsList = lowGradeWarnings.map(w => `<li>${w}</li>`).join('');
                            detailsHTML = `
                                <div class="status-panel">
                                    <h4 class="panel-title title-warning">⚠️ TIÊU CHÍ CẦN CẢI THIỆN</h4>
                                    <ul class="notes-list suggestion-list" style="color: #b45309;">
                                        ${warningsList}
                                    </ul>
                                    <p style="color: #b45309; font-size: 0.85rem; font-weight: 500; margin-top: 12px; margin-bottom: 0;">
                                        💡 <em>Mặc dù giáo án đã đạt điểm đỗ tổng quát, bạn nên điều chỉnh lại các phần trên để có trải nghiệm tối ưu.</em>
                                    </p>
                                </div>
                            `;
                        } else {
                            detailsHTML = `
                                <div class="status-panel" style="display: flex; flex-direction: column; justify-content: center;">
                                    <div class="success-box">
                                        <div class="success-icon">🎉</div>
                                        <p class="success-text">ĐẠT TIÊU CHUẨN XUẤT SẮC</p>
                                        <p style="margin: 6px 0 0 0; font-size: 0.85rem; color: #047857; opacity: 0.85;">
                                            Mọi tiêu chí giảng dạy đều đáp ứng tốt các chuẩn sư phạm Montessori!
                                        </p>
                                    </div>
                                </div>
                            `;
                        }

                        board.innerHTML = `
                            <div class="board-header">
                                <h3 class="board-title">${icon} ${plan.filename}</h3>
                                <span class="badge ${statusClass}">${statusText} • Điểm: ${plan.total_score}/100</span>
                            </div>
                            <div class="board-content">
                                <div>
                                    ${progressHTML}
                                </div>
                                <div>
                                    ${detailsHTML}
                                </div>
                            </div>
                        `;

                        container.appendChild(board);
                    });
                })
                .catch(error => {
                    console.error("Error fetching results API:", error);
                    document.getElementById('boards-container').innerHTML = `
                        <div style="text-align: center; color: #b91c1c; padding: 40px; font-weight: bold; background: rgba(255,255,255,0.4); border-radius: 20px; border: 1px solid rgba(255,255,255,0.5);">
                            Không thể kết nối đến máy chủ API hoặc tệp dữ liệu điểm số chưa sẵn sàng. Hãy chạy quy trình chấm điểm trước.
                        </div>
                    `;
                });
        });
    </script>
</body>
</html>
